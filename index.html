	<!-- プロフィール部分を隠すためのクエリチェック -->
	<script>
		(function () {
			// URL のクエリパラメータを取得
			var urlParams = new URLSearchParams(window.location.search);
			// クエリに noProfile が含まれている場合
			if (urlParams.has('noProfile')) {
				document.addEventListener("DOMContentLoaded", function () {
					var profileSection = document.getElementById("content");
					if (profileSection) {
						profileSection.style.display = "none";
					}
				});
			}
		})();
	</script>

	<script>
		(function () {
			var lang = (navigator.language || navigator.languages?.[0] || 'en').startsWith('ja') ? 'ja' : 'en';
			function applyLang() {
				document.querySelectorAll('[data-ja][data-en]').forEach(function (el) {
					el.textContent = el.getAttribute('data-' + lang);
				});
				var btn = document.getElementById('lang-toggle');
				if (btn) btn.textContent = lang === 'ja' ? 'EN' : 'JA';
			}
			window.toggleLang = function () {
				lang = lang === 'ja' ? 'en' : 'ja';
				applyLang();
			};
			document.addEventListener('DOMContentLoaded', applyLang);
		})();
	</script>
